{% extends "base.html" %}
{% block title %}Book Appointment - Patient{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-calendar-plus text-success"></i> Book Appointment</h2>
        <a href="{{ url_for('patient_dashboard') }}" class="btn btn-primary">← Dashboard</a>
    </div>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-header bg-success text-white text-center">
                    <h4><i class="fas fa-stethoscope"></i> Schedule Your Visit</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Select Doctor</label>
                                <select name="doctor_email" class="form-select" required>
                                    <option value="">Choose a doctor...</option>
                                    {% for doctor in doctors %}
                                    <option value="{{ doctor.email }}">
                                        Dr. {{ doctor.full_name }} - {{ doctor.specialty or 'General Physician' }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Date</label>
                                <input type="date" name="appointment_date" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Time</label>
                            <select name="appointment_time" class="form-select" required>
                                <option value="">Select time...</option>
                                <option value="09:00">09:00 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="14:00">02:00 PM</option>
                                <option value="15:00">03:00 PM</option>
                                <option value="16:00">04:00 PM</option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                <i class="fas fa-calendar-check"></i> Book Appointment
                            </button>
                            <a href="{{ url_for('patient_dashboard') }}" class="btn btn-secondary btn-lg">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
